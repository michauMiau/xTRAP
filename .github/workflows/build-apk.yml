name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'src/**'
      - '.github/workflows/build-apk.yml'
      - 'buildozer.spec'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'src/**'
      - '.github/workflows/build-apk.yml'
      - 'buildozer.spec'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ACCEPT_LICENSES: "true"
      JAVA_TOOL_OPTIONS: "-Djava.net.preferIPv4Stack=true"
    
    steps:
    - uses: actions/checkout@v4
      with:
        sparse-checkout: |
          src/
          buildozer.spec
    
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Buildozer deps
      run: |
        sudo apt-get update && sudo apt-get install -y python3-dev build-essential git zip unzip libtool autoconf automake pkg-config libltdl-dev
        pip install --user cython buildozer kivy pillow pyjnius requests aiohttp
        export PATH="$HOME/.local/bin:$PATH"
    
    - name: Build APK
      env:
        CFLAGS: "-Wno-error=implicit-function-declaration -Wno-error=deprecated-declarations"
        LDFLAGS: "-Wno-error=implicit-function-declaration"
      run: |
        cp -f src/main.py .
        
        # Patch SDL2's ALooper_pollAll -> pollOnce (deprecation fix)
        if [ -d "$HOME/.buildozer/android/platform/build-arm64-v8a_armeabi-v7a/build/bootstrap_builds/sdl2/jni/SDL/src" ]; then
          find $HOME/.buildozer/android/platform/build-arm64-v8a_armeabi-v7a/build/bootstrap_builds/sdl2/jni/SDL/src -name '*.c' | xargs sed -i 's/ALooper_pollAll(/ALooper_pollOnce(/g'
        fi
        cd $GITHUB_WORKSPACE
        yes | buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: xtrap-apk
        path: bin/*.apk
        if-no-files-found: error